$schema: "https://docs.voltdb.com/ActiveSP/schemas/voltsp-uber.schema.json"
version: 1
name: "__PIPELINE_NAME__"

source:
  collection:
    elements:
      - "one"
      - "two"

processors:
  - javascript:
      script: |
        function process(input) {
          if (typeof input === "string") {
            return input.toUpperCase();
          }
          return input;
        }

sink:
  stdout: {}

logging:
  globalLevel: "INFO"
